<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D-Tube | Watch</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .player-container { max-width: 900px; margin: 30px auto; }
        video { width: 100%; border-radius: 12px; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .channel-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding: 15px; background: var(--bg-card); border-radius: 12px; }
        .channel-info h3 { margin-bottom: 5px; }
        .channel-info p { color: var(--text-muted); font-size: 14px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="brand">▶ <span>D-Tube</span></a>
        <div class="nav-links" id="auth-links"></div>
    </nav>

    <div class="container player-container">
        <video id="videoPlayer" controls autoplay>
            <source id="videoSource" src="" type="video/mp4">
            Your browser does not support HTML video.
        </video>
<div class="action-bar" style="display: flex; justify-content: space-between; align-items: center; background: #222; padding: 15px; border-radius: 12px; margin-top: 15px; flex-wrap: wrap; gap: 15px;">
    
    <div style="display: flex; align-items: center; gap: 20px;">
        <div class="channel-info">
            <h3 id="channel-name" style="margin: 0; font-size: 1.2rem; color: #fff;">Channel</h3>
            <p id="sub-count" style="margin: 5px 0 0 0; color: #aaa; font-size: 0.9rem;">Loading subscribers...</p>
        </div>
        <div>
            <button id="sub-btn" class="btn btn-primary" onclick="toggleSubscription()" style="background: #cc0000; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;">Subscribe</button>
            <p id="sub-status" style="margin-top: 5px; color: #cc0000; font-size: 12px; margin-bottom: 0;"></p>
        </div>
    </div>

    <div style="display: flex; align-items: center; gap: 10px;">
        <button id="like-btn" class="btn btn-outline" style="background: #333; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 20px; cursor: pointer;">👍 Like (<span id="like-count">0</span>)</button>

        <div id="creator-controls" style="display: flex; gap: 10px; border-left: 1px solid #555; padding-left: 10px;">
            <button id="rename-btn" class="btn btn-outline" style="background: transparent; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 20px; cursor: pointer;">✏️ Rename</button>
            <button id="delete-btn" class="btn btn-outline" style="background: transparent; color: #cc0000; border: 1px solid #cc0000; padding: 8px 15px; border-radius: 20px; cursor: pointer;">🗑️ Delete</button>
        </div>
    </div>

</div>

<div class="comments-section" style="margin-top: 20px;">
    <h3>Comments</h3>
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <input type="text" id="comment-input" placeholder="Add a comment..." style="flex: 1;">
        <button id="submit-comment" class="btn btn-primary">Post</button>
       
    </div>
     <div id="comments-list"></div>
    </div>

        

</div>
        
    <script src="app.js"></script>
    <script>
        // Extract data from the URL (e.g., ?id=1&file=123.mp4&channel=2)
        const urlParams = new URLSearchParams(window.location.search);
        const filename = urlParams.get('file');
        const channelId = urlParams.get('channel');
        const username = urlParams.get('user');
        const videoId = urlParams.get('id');
        
        let isSubscribed = false;

        if (!filename || !channelId) {
            document.querySelector('.player-container').innerHTML = '<h2>Video not found.</h2>';
        } else {
            // Load Video Stream
            document.getElementById('videoSource').src = `${API_URL}/videos/stream/${filename}`;
            document.getElementById('videoPlayer').load();
            document.getElementById('channel-name').innerText = username;
            
            
            fetch(`${API_URL}/subscriptions/stats/${channelId}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('sub-count').innerText = `${data.subscribers || 0} Subscribers`;
                });
        }

        //  Subscribe Button
        async function toggleSubscription() {
            const token = localStorage.getItem('token');
            const statusText = document.getElementById('sub-status');

            if (!token) {
                statusText.innerText = "You must be signed in to subscribe.";
                return;
            }

            try {
                const res = await fetch(`${API_URL}/subscriptions/toggle`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ channelId: parseInt(channelId) })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    const btn = document.getElementById('sub-btn');
                    isSubscribed = data.subscribed;
                    
                
                    btn.innerText = isSubscribed ? "Unsubscribe" : "Subscribe";
                    btn.className = isSubscribed ? "btn btn-outline" : "btn btn-primary";
                    
                    //  update the count (refresh page to sync)
                    window.location.reload(); 
                } else {
                    statusText.innerText = data.error;
                }
            } catch (err) {
                statusText.innerText = "Network Error";
            }
        }

        // Add this to your existing video.html script

async function loadLikes() {
    const res = await fetch(`${API_URL}/videos/${videoId}/likes`);
    const data = await res.json();
    document.getElementById('like-count').innerText = data.count;
}

async function loadComments() {
    const res = await fetch(`${API_URL}/videos/${videoId}/comments`);
    const comments = await res.json();
    
    const commentsList = document.getElementById('comments-list');
    commentsList.innerHTML = comments.map(c => `
        <div style="margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #333;">
            <strong style="color: #4CAF50;">${c.username}</strong> 
            <span style="font-size: 12px; color: #888;"> • ${c.timeAgo}</span>
            <p style="margin: 5px 0 0 0;">${c.content}</p>
        </div>
    `).join('');
}

// Event Listeners
document.getElementById('like-btn').onclick = async () => {
    await fetch(`${API_URL}/videos/like`, {
        method: 'POST',
        headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}` 
        },
        body: JSON.stringify({ videoId })
    });
    loadLikes(); // Refresh count
};

document.getElementById('submit-comment').onclick = async () => {
    const content = document.getElementById('comment-input').value;
    if (!content) return;

    await fetch(`${API_URL}/videos/comment`, {
        method: 'POST',
        headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}` 
        },
        body: JSON.stringify({ videoId, content })
    });
    
    document.getElementById('comment-input').value = ''; // Clear input
    loadComments(); // Refresh list
};
// Rename Logic
document.getElementById('rename-btn').onclick = async () => {
    const newTitle = prompt("Enter new video title:");
    if (!newTitle) return;

    const res = await fetch(`${API_URL}/videos/${videoId}`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
        },
        body: JSON.stringify({ title: newTitle })
    });

    if (res.ok) {
        alert("Video renamed successfully!");
        location.reload(); // Refresh the page to show the new title
    } else {
        alert("Failed to rename. You can only edit your own videos.");
    }
};

// Delete Logic
document.getElementById('delete-btn').onclick = async () => {
    if (!confirm("Are you sure you want to delete this video? This cannot be undone.")) return;

    const res = await fetch(`${API_URL}/videos/${videoId}`, {
        method: 'DELETE',
        headers: {
            'Authorization': `Bearer ${localStorage.getItem('token')}`
        }
    });

    if (res.ok) {
        alert("Video deleted.");
        window.location.href = 'index.html'; // Kick them back to the feed
    } else {
        alert("Failed to delete. You can only delete your own videos.");
    }
};
// Initialize on page load
loadLikes();
loadComments();
    </script>
</body>
</html>
