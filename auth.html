<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D-Tube | Auth</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html" class="brand">▶ <span>D-Tube</span></a>
    </nav>

    <div class="auth-container">
        
        <div id="login-section">
            <h2>Sign In</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>
            <div class="form-toggle" onclick="toggleView('register-section')">Don't have an account? Sign Up</div>
            <div class="form-toggle" onclick="toggleView('forgot-section')" style="margin-top: 5px;">Forgot Password?</div>
        </div>

        <div id="register-section" class="hidden">
            <h2>Create Account</h2>
            <form id="register-form">
                <input type="text" id="reg-username" placeholder="Username" required>
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="password" id="reg-password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
            </form>
            <div class="form-toggle" onclick="toggleView('login-section')">Already have an account? Sign In</div>
        </div>

        <div id="forgot-section" class="hidden">
            <h2>Reset Password</h2>
            <form id="forgot-form">
                <input type="email" id="forgot-email" placeholder="Enter your registered email" required>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Generate Reset Token</button>
            </form>
            <p id="token-display" style="color: #4CAF50; font-size: 12px; margin-top: 10px; word-break: break-all;"></p>
            
            <form id="reset-form" class="hidden" style="margin-top: 15px; border-top: 1px solid #444; padding-top: 15px;">
                <input type="text" id="reset-token" placeholder="Paste Reset Token Here" required>
                <input type="password" id="reset-new-password" placeholder="New Password" required>
                <button type="submit" class="btn btn-outline" style="width: 100%;">Apply New Password</button>
            </form>

            <div class="form-toggle" onclick="toggleView('login-section')">Back to Sign In</div>
        </div>

        <p id="auth-status" style="text-align: center; margin-top: 15px; color: #cc0000;"></p>
    </div>

    <script src="app.js"></script>
    <script>
      
        function toggleView(showId) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('register-section').classList.add('hidden');
            document.getElementById('forgot-section').classList.add('hidden');
            document.getElementById('auth-status').innerText = '';
            document.getElementById(showId).classList.remove('hidden');
        }

        // Login Logic
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('token', data.token); 
                    window.location.href = 'index.html'; 
                } else {
                    document.getElementById('auth-status').innerText = data.error;
                }
            } catch (err) {
                document.getElementById('auth-status').innerText = "Network Error";
            }
        });

        // Register Logic
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            
            try {
                const res = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.href = 'index.html';
                } else {
                    document.getElementById('auth-status').innerText = data.error;
                }
            } catch (err) {
                document.getElementById('auth-status').innerText = "Network Error";
            }
        });

        //Forgot Password Logic
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('forgot-email').value;
            
            const res = await fetch(`${API_URL}/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            
            if (res.ok) {
                document.getElementById('token-display').innerText = "Test Token (copy this): " + data.resetToken;
                document.getElementById('reset-form').classList.remove('hidden');
            } else {
                document.getElementById('auth-status').innerText = data.error;
            }
        });

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resetToken = document.getElementById('reset-token').value;
            const newPassword = document.getElementById('reset-new-password').value;
            
            const res = await fetch(`${API_URL}/auth/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ resetToken, newPassword })
            });
            
            if (res.ok) {
                alert("Password reset! You can now log in.");
                toggleView('login-section');
            } else {
                document.getElementById('auth-status').innerText = "Failed to reset password.";
            }
        });

        //del user
  
    </script>
</body>
</html>
